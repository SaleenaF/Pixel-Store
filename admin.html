<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Orders - Pixel Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Cloud Decorations -->
    <img src="images/cloud.png" class="cloud-decoration cloud-top-right" alt="Decorative cloud">
    <img src="images/cloud.png" class="cloud-decoration cloud-bottom-left" alt="Decorative cloud">
    <header>
        <nav>
            <h1>Pixel Shop Admin</h1>
            <div class="nav-buttons">
                <span id="userGreeting">Admin Panel</span>
                <button class="white-button" id="logoutBtn">Logout</button>
            </div>
        </nav>
    </header>
    
    <main>
        <h2 class="welcome-title">All Customer Orders</h2>
        <div class="admin-orders-container" id="adminOrdersContainer">
            <!-- Orders will be loaded here -->
        </div>
    </main>
    
    <footer>
        <img src="images/footer.png" alt="Cute pixel cat in clouds">
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
